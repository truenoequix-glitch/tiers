<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCTiers Replica | Overall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #0d111a; font-family: 'Segoe UI', sans-serif; color: #fdfdfd; }
        .panel-bg { background: #111723; border: 1px solid #1f283d; }
        .tier-text { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .region-badge { background-color: #7f1d1d; color: #f87171; border: 1px solid #991b1b; padding: 4px 12px; font-weight: bold; border-radius: 4px; font-size: 1rem; }
        .rank-yellow { background-color: #fbbf24; color: #451a03; }
        .player-row { background-color: #161d2b; border: 1px solid #1f283d; border-radius: 12px; transition: 0.2s; }
        .player-row:hover { border-color: #3b4b6b; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="panel-bg rounded-2xl p-6 shadow-2xl">
            
            <div class="flex justify-between items-center mb-8">
                <div class="bg-[#1a2030] border border-[#323a4f] px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                    <span class="opacity-40">i</span> Information
                </div>
                <div class="flex items-center gap-4 p-2 px-4 rounded-lg bg-[#1a2030] border border-[#323a4f] text-xs">
                    <span class="text-slate-500 uppercase font-bold">Server IP</span>
                    <span class="font-bold text-white tracking-wider text-[13px]">minemen.club, hypixel.net</span>
                    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" class="h-4 w-4 opacity-70" alt="Discord">
                </div>
            </div>

            <div class="grid grid-cols-12 gap-4 text-slate-500 text-[11px] uppercase font-black px-6 mb-4 tracking-widest">
                <div class="col-span-1">#</div>
                <div class="col-span-6">Player</div>
                <div class="col-span-2 text-center">Region</div>
                <div class="col-span-3 text-right">Tier</div>
            </div>

            <div id="player-container" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlfD0FvQ-kVK2leat4n9qOvfu3zJ8rlv-B8qm9434NOMGCV4pOyw7B-cchbzFCpKCVSOGFhCI0YST_/pub?output=csv';

        // Lógica de puntos basada en el Tier
        function getPointsByTier(tier) {
            const scores = {
                'S+': 100,
                'S': 80,
                'A+': 60,
                'A': 40,
                'B+': 20,
                'B': 1
            };
            return scores[tier] || 0;
        }

        function loadPlayers() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const players = results.data;
                    const container = document.getElementById('player-container');
                    container.innerHTML = '';

                    players.forEach(p => {
                        if(!p.Jugador) return;

                        const points = getPointsByTier(p.Tier.trim());

                        const row = `
                            <div class="player-row grid grid-cols-12 gap-4 items-center p-3 relative overflow-hidden">
                                <div class="col-span-2 flex items-center relative h-16">
                                    <div class="absolute inset-y-0 left-0 w-12 rank-yellow rounded-l-lg flex items-center justify-center">
                                        <span class="text-2xl font-black italic">${p.Posicion}</span>
                                    </div>
                                    <img src="https://mc-heads.net/avatar/${p.Jugador}/64" class="h-16 w-16 relative z-10 rounded shadow-2xl ml-14">
                                </div>

                                <div class="col-span-5 flex flex-col pl-10">
                                    <span class="text-xl font-bold text-white tracking-wide">${p.Jugador}</span>
                                    <div class="flex items-center gap-1 text-[11px] text-slate-500 font-bold mt-1">
                                        <span class="text-amber-500">◆</span> Combat Master <span class="opacity-50">(${points} points)</span>
                                    </div>
                                </div>

                                <div class="col-span-2 flex justify-center">
                                    <span class="region-badge uppercase tracking-tighter">${p.Region}</span>
                                </div>

                                <div class="col-span-3 text-right pr-6">
                                    <span class="tier-text text-slate-400 italic">${p.Tier}</span>
                                </div>
                            </div>
                        `;
                        container.innerHTML += row;
                    });
                }
            });
        }

        window.onload = loadPlayers;
    </script>
</body>
</html>

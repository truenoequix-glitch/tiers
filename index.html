<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VayluxMC | Tiers System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #0d111a; color: #fdfdfd; font-family: 'Segoe UI', sans-serif; }
        
        /* Contenedor de la tarjeta */
        .player-card { 
            background-color: #161d2b; border: 1px solid #1f283d; 
            border-radius: 12px; margin-bottom: 25px; height: 95px;
            display: grid; grid-template-columns: repeat(12, 1fr);
            align-items: center; position: relative; transition: 0.3s;
        }

        .player-card:hover { transform: translateY(-3px); border-color: #3b4b6b; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }

        /* Pestaña de posición corregida (No amontonada) */
        .rank-badge { 
            width: 55px; height: 65px; position: absolute; left: 0; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-style: italic; font-size: 1.6rem; 
            border-radius: 0 12px 12px 0; box-shadow: 4px 0 15px rgba(0,0,0,0.4);
            z-index: 10;
        }

        /* Colores de podio degradados */
        .rank-1 { background: linear-gradient(135deg, #fbbf24, #d97706); color: #451a03; }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #475569); color: #0f172a; }
        .rank-3 { background: linear-gradient(135deg, #b45309, #78350f); color: #fef3c7; }
        .rank-default { background: #1e293b; color: #64748b; }

        /* Efecto de brillo blanco al pasar el mouse por el número */
        .player-card:hover .rank-badge::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); animation: shine 0.6s forwards;
        }
        @keyframes shine { 100% { left: 200%; } }

        .tier-text { 
            font-weight: 900; font-size: 2.2rem; font-style: italic;
            background-clip: text; -webkit-background-clip: text; color: transparent;
        }

        .region-tag { background: #7f1d1d; color: #f87171; border: 1px solid #991b1b; padding: 4px 12px; border-radius: 6px; font-weight: 800; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto" id="leaderboard">
        </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlfD0FvQ-kVK2leat4n9qOvfu3zJ8rlv-B8qm9434NOMGCV4pOyw7B-cchbzFCpKCVSOGFhCI0YST_/pub?output=csv';

        function getTierGradient(tier) {
            const t = tier.toUpperCase();
            if (t.includes('S+')) return 'linear-gradient(#ff4d4d, #990000)';
            if (t.includes('S')) return 'linear-gradient(#ef4444, #7f1d1d)';
            if (t.includes('A')) return 'linear-gradient(#fb923c, #9a3412)';
            if (t.includes('B')) return 'linear-gradient(#4ade80, #14532d)';
            return 'linear-gradient(#60a5fa, #1e3a8a)';
        }

        function loadData() {
            Papa.parse(CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    // Filtrar filas vacías y ORDENAR POR PUNTOS
                    let players = results.data.filter(p => p.Jugador);
                    players.sort((a, b) => parseInt(b.Puntos || 0) - parseInt(a.Puntos || 0));

                    const container = document.getElementById('leaderboard');
                    container.innerHTML = '';

                    players.forEach((p, index) => {
                        const rank = index + 1;
                        const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-default';
                        const tierColor = getTierGradient(p.Tier);

                        container.innerHTML += `
                            <div class="player-card">
                                <div class="rank-badge ${rankClass}">${rank}</div>
                                
                                <div class="col-span-7 flex items-center pl-20">
                                    <img src="https://visage.surgeplay.com/bust/120/${p.UUID}" class="h-24 -mt-8 drop-shadow-2xl">
                                    <div class="ml-12">
                                        <h2 class="text-2xl font-black italic uppercase leading-none">${p.Jugador}</h2>
                                        <p class="text-[11px] font-bold text-slate-500 mt-2 uppercase tracking-tighter">
                                            <span class="text-amber-500">✦</span> Combat Master (${p.Puntos} points)
                                        </p>
                                    </div>
                                </div>

                                <div class="col-span-2 flex justify-center">
                                    <span class="region-tag uppercase text-xs">${p.Region}</span>
                                </div>

                                <div class="col-span-3 text-right pr-12">
                                    <span class="tier-text" style="background-image: ${tierColor}">${p.Tier}</span>
                                </div>
                            </div>
                        `;
                    });
                }
            });
        }
        window.onload = loadData;
    </script>
</body>
</html>

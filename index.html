<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VayluxMC | Tiers Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #0d111a; color: white; font-family: 'Segoe UI', sans-serif; }
        .discord-banner {
            background: #161d2b; border: 1px solid #1f283d;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: space-between; padding: 15px 25px; margin-bottom: 30px;
        }
        .player-card {
            background: #111723; border: 1px solid #1f283d;
            border-radius: 15px; padding: 15px 25px; margin-bottom: 15px;
            display: flex; align-items: center; transition: 0.3s;
        }
        .player-card:hover { border-color: #3b82f6; transform: scale(1.01); }
        
        /* Círculos de modalidad estilo MCTier */
        .mode-container { display: flex; gap: 15px; }
        .mode-circle {
            width: 55px; height: 55px; background: #1a2235;
            border: 2px solid #2d364d; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .mode-icon { width: 30px; height: 30px; }
        .mode-tier {
            position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); font-size: 11px;
            font-weight: 900; background: #000; padding: 1px 7px;
            border-radius: 5px; border: 1px solid #333;
        }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <div class="discord-banner">
            <div class="flex items-center gap-4">
                <img src="https://minecraft.wiki/images/Thumb_Discord_Logo.png" width="35">
                <span class="text-xl font-bold">discord.gg/clanzteam</span>
            </div>
            <a href="https://discord.gg/clanzteam" class="bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-lg font-bold transition">UNIRSE</a>
        </div>

        <div id="leaderboard"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlfD0FvQ-kVK2leat4n9qOvfu3zJ8rlv-B8qm9434NOMGCV4pOyw7B-cchbzFCpKCVSOGFhCI0YST_/pub?output=csv

';
        const ICONS = {
            bedfight: "https://minecraft.wiki/images/Shears_JE3_BE2.png",
            bedwars: "https://minecraft.wiki/images/Red_Bed_BE.png",
            topfight: "https://minecraft.wiki/images/Wooden_Sword_JE3_BE3.png",
            blockfight: "https://minecraft.wiki/images/White_Wool_JE4_BE2.png"
        };

        function loadData() {
            Papa.parse(CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    let rows = results.data.filter(r => r.UUID);
                    let playersMap = {};

                    // Agrupar modalidades por jugador
                    rows.forEach(r => {
                        if (!playersMap[r.UUID]) {
                            playersMap[r.UUID] = { name: r.Nombre, region: r.Region, totalPts: 0, modes: {} };
                        }
                        playersMap[r.UUID].modes[r.Modalidad.toLowerCase()] = r.Tier;
                        playersMap[r.UUID].totalPts += parseInt(r.Puntos || 0);
                    });

                    const container = document.getElementById('leaderboard');
                    container.innerHTML = '';

                    Object.values(playersMap).sort((a,b) => b.totalPts - a.totalPts).forEach((p, index) => {
                        let modesHtml = '';
                        ['bedfight', 'bedwars', 'topfight', 'blockfight'].forEach(m => {
                            let tier = p.modes[m] || '-';
                            let tierColor = tier !== '-' ? '#f87171' : '#4b5563';
                            modesHtml += `
                                <div class="mode-circle">
                                    <img src="${ICONS[m]}" class="mode-icon">
                                    <span class="mode-tier" style="color: ${tierColor}">${tier}</span>
                                </div>
                            `;
                        });

                        container.innerHTML += `
                            <div class="player-card">
                                <div class="text-2xl font-black italic w-12 text-slate-500">#${index+1}</div>
                                <div class="flex-1 flex items-center">
                                    <img src="https://visage.surgeplay.com/bust/100/${Object.keys(playersMap).find(k => playersMap[k] === p)}" class="h-20">
                                    <div class="ml-8">
                                        <div class="text-2xl font-black italic uppercase">${p.name}</div>
                                        <div class="bg-red-900/30 text-red-400 px-2 py-0.5 rounded text-[10px] font-bold inline-block border border-red-800">${p.region}</div>
                                    </div>
                                </div>
                                <div class="mode-container">${modesHtml}</div>
                            </div>
                        `;
                    });
                }
            });
        }
        window.onload = loadData;
    </script>
</body>
</html>
